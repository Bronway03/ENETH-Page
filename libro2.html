<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro interactivo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7f6;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

.viewer-container{
max-width:1000px;
margin:auto;
padding:30px;
}

canvas{
max-width:100%;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
transition:all .3s;
display:block;
margin:auto;
}

/* CONTROLES */

.controls{
display:flex;
flex-wrap:wrap;
gap:12px;
justify-content:center;
margin-bottom:25px;
}

/* BOTONES MODERNOS */

.btn-control{
border-radius:40px;
padding:8px 18px;
font-size:14px;
border:1px solid rgba(0,0,0,0.08);
background:white;
color:#333;
transition:all .25s ease;
box-shadow:0 3px 8px rgba(0,0,0,0.06);
}

/* HOVER SUAVE */

.btn-control:hover{
transform:translateY(-2px);
box-shadow:0 6px 14px rgba(0,0,0,0.12);
background:#f2f4f3;
}

/* BOTÓN PRINCIPAL */

.btn-primary-modern{
background:#2f7a63;
color:white;
border:none;
}

.btn-primary-modern:hover{
background:#256954;
}

/* BOTÓN SECUNDARIO */

.btn-neutral{
background:#f3f5f4;
}

/* BOTÓN CERRAR */

.btn-close-modern{
background:#e8eceb;
border:none;
color:#333;
}

.btn-close-modern:hover{
background:#dfe4e2;
}

/* BARRA SUPERIOR */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

#pageInfo{
font-weight:500;
color:#5f6a67;
}

</style>

</style>
</head>

<body>

<div class="viewer-container">

<div class="top-bar">

<h4 class="fw-bold">Libro interactivo</h4>

<a href="index.html" class="btn-control btn-close-modern">
Cerrar libro
</a>

</div>

<div class="controls">

<button id="prev" class="btn btn-dark btn-control">
⬅ Página anterior
</button>

<span id="pageInfo" class="align-self-center fw-bold">
Página 1
</span>

<button id="next" class="btn btn-dark btn-control">
Página siguiente ➡
</button>

<button id="zoomIn" class="btn btn-success btn-control">
🔍 Acercar
</button>

<button id="zoomOut" class="btn btn-secondary btn-control">
🔎 Alejar
</button>

</div>

<canvas id="pdf-render"></canvas>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>

const url = "Libro.pdf";

let pdfDoc = null;
let pageNum = 1;
let scale = 1.4;
let canvas = document.getElementById("pdf-render");
let ctx = canvas.getContext("2d");

function renderPage(num){

pdfDoc.getPage(num).then(function(page){

let viewport = page.getViewport({scale:scale});

canvas.height = viewport.height;
canvas.width = viewport.width;

let renderContext = {
canvasContext: ctx,
viewport: viewport
};

page.render(renderContext);

document.getElementById("pageInfo").innerText =
"Página " + pageNum + " de " + pdfDoc.numPages;

});

}

pdfjsLib.getDocument(url).promise.then(function(pdf){

pdfDoc = pdf;

renderPage(pageNum);

});


document.getElementById("prev").addEventListener("click", function(){

if(pageNum <= 1){
return;
}

pageNum--;

renderPage(pageNum);

});

document.getElementById("next").addEventListener("click", function(){

if(pageNum >= pdfDoc.numPages){
return;
}

pageNum++;

renderPage(pageNum);

});


document.getElementById("zoomIn").addEventListener("click", function(){

scale = scale + 0.25;

renderPage(pageNum);

});

document.getElementById("zoomOut").addEventListener("click", function(){

if(scale > 0.5){

scale = scale - 0.25;

renderPage(pageNum);

}

});

</script>

</body>
</html>
