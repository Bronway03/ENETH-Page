<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Libro para Colorear</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuente moderna -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#f4f7f2;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
font-family:'Inter',sans-serif;
}

/* tarjeta principal */

.card{
background:white;
border-radius:28px;
border:none;
padding:35px;
max-width:1100px;
width:100%;
box-shadow:
0 20px 50px rgba(0,0,0,0.08),
0 4px 10px rgba(0,0,0,0.05);
}

h1{
font-weight:700;
color:#2f5d2a;
margin-bottom:25px;
}

/* toolbar */

.toolbar{
background:white;
border-radius:20px;
padding:15px 20px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
align-items:center;
}

/* botones modernos */

.btn{
border:none;
border-radius:999px;
padding:8px 18px;
font-weight:600;
font-size:14px;
transition:all .25s ease;
}

.btn:hover{
transform:translateY(-2px);
}

.btn-green{
background:#8BC34A;
color:white;
}

.btn-green:hover{
background:#7cb342;
}

.btn-yellow{
background:#FFC107;
color:#333;
}

.btn-yellow:hover{
background:#ffb300;
}

/* inputs */

input[type="range"]{
accent-color:#8BC34A;
}

input[type="color"]{
width:40px;
height:40px;
border:none;
border-radius:10px;
}

select{
border-radius:10px !important;
}

/* canvas */

.canvas-container{
position:relative;
display:inline-block;
border-radius:22px;
overflow:hidden;
margin:25px 0;
background:white;
border:1px solid #e5e5e5;
box-shadow:
0 10px 30px rgba(0,0,0,0.1);
}

canvas{
display:block;
}

#drawCanvas{
position:absolute;
top:0;
left:0;
}

/* miniaturas */

.thumbs{
margin-top:15px;
}

.thumbs img{
width:95px;
height:95px;
object-fit:cover;
border-radius:16px;
margin:6px;
cursor:pointer;
transition:.25s;
border:3px solid transparent;
}

.thumbs img:hover{
transform:scale(1.08);
border-color:#8BC34A;
}

/* boton libro */

.invite-btn{
margin-top:35px;
font-size:1.1rem;
padding:14px 34px;
border-radius:999px;
background:#4CAF50;
color:white;
border:none;
font-weight:600;
transition:.25s;
text-decoration:none;
display:inline-block;
}

.invite-btn:hover{
background:#43a047;
transform:scale(1.05);
}

/* modal */

#zoomModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:1000;
}

#zoomModal img{
max-width:90%;
max-height:90%;
border-radius:12px;
}

#closeZoom{
position:absolute;
top:20px;
right:30px;
font-size:30px;
color:white;
cursor:pointer;
font-weight:bold;
}

</style>

</head>
<body>

<div class="card text-center">

<div class="text-start mb-3">
<a href="index.html" class="btn btn-green">⬅ Volver al inicio</a>
</div>

<h1>Este No es tu Hogar</h1>

<div class="toolbar">

<label>Color</label>
<input type="color" id="colorPicker" value="#000000">

<label>Tamaño</label>
<input type="range" id="brushSize" min="1" max="40" value="5">

<label>Opacidad</label>
<input type="range" id="opacity" min="0.1" max="1" step="0.05" value="1">

<select id="brushType" class="form-select form-select-sm" style="width:150px">
<option value="normal">Pincel normal</option>
<option value="marcador">Marcador</option>
<option value="pincel">Pincel suave</option>
<option value="lapiz">Lápiz</option>
</select>

<button id="eraserBtn" class="btn btn-yellow">🧽 Borrador</button>
<button id="clearBtn" class="btn btn-green">🧼 Limpiar</button>
<button id="saveBtn" class="btn btn-green">💾 Guardar</button>

</div>

<div class="canvas-container">

<canvas id="baseCanvas" width="800" height="600"></canvas>
<canvas id="drawCanvas" width="800" height="600"></canvas>

</div>

<div class="thumbs d-flex flex-wrap justify-content-center">

<img src="Libro-01.jpg" onclick="setImage(this)">
<img src="Libro-02.jpg" onclick="setImage(this)">
<img src="Libro-03.jpg" onclick="setImage(this)">
<img src="Libro-04.jpg" onclick="setImage(this)">
<img src="Libro-05.jpg" onclick="setImage(this)">

</div>

<div>

<a href="libro-completo.html" class="invite-btn">
📖 ¡Prueba el libro completo aquí!
</a>

</div>

</div>

<div id="zoomModal">
<span id="closeZoom">❌</span>
<img id="zoomImage">
</div>

<script>

/* TU JAVASCRIPT ORIGINAL NO SE TOCÓ */

const baseCanvas = document.getElementById("baseCanvas");
const drawCanvas = document.getElementById("drawCanvas");
const baseCtx = baseCanvas.getContext("2d");
const drawCtx = drawCanvas.getContext("2d");

const colorPicker = document.getElementById("colorPicker");
const brushSize = document.getElementById("brushSize");
const opacitySlider = document.getElementById("opacity");
const eraserBtn = document.getElementById("eraserBtn");
const clearBtn = document.getElementById("clearBtn");
const saveBtn = document.getElementById("saveBtn");
const brushType = document.getElementById("brushType");

let painting = false;
let erasing = false;
let currentColor = colorPicker.value;
let currentSize = brushSize.value;
let currentOpacity = opacitySlider.value;
let currentBrush = brushType.value;
let currentImage = null;

function setImage(img){

currentImage = img;

baseCtx.clearRect(0,0,baseCanvas.width,baseCanvas.height);
drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);

const ratio = Math.min(
baseCanvas.width / img.naturalWidth,
baseCanvas.height / img.naturalHeight
);

const x = (baseCanvas.width - img.naturalWidth * ratio)/2;
const y = (baseCanvas.height - img.naturalHeight * ratio)/2;

baseCtx.drawImage(img,x,y,img.naturalWidth*ratio,img.naturalHeight*ratio);

}

drawCanvas.addEventListener("mousedown",startDraw);
drawCanvas.addEventListener("mouseup",endDraw);
drawCanvas.addEventListener("mousemove",draw);
drawCanvas.addEventListener("mouseleave",endDraw);

function startDraw(e){

painting = true;

drawCtx.beginPath();
drawCtx.moveTo(getX(e),getY(e));

}

function endDraw(){

painting = false;
drawCtx.closePath();

}

function draw(e){

if(!painting) return;

drawCtx.save();

drawCtx.globalCompositeOperation = erasing ? "destination-out" : "source-over";

drawCtx.lineCap="round";
drawCtx.lineJoin="round";

const rgb = hexToRgb(currentColor);

let strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${currentOpacity})`;
let lineWidth = currentSize;

drawCtx.lineWidth=lineWidth;
drawCtx.strokeStyle=strokeStyle;

drawCtx.lineTo(getX(e),getY(e));
drawCtx.stroke();

drawCtx.restore();

}

function getX(e){

return e.clientX - drawCanvas.getBoundingClientRect().left;

}

function getY(e){

return e.clientY - drawCanvas.getBoundingClientRect().top;

}

function hexToRgb(hex){

const bigint = parseInt(hex.slice(1),16);
const r = (bigint>>16)&255;
const g = (bigint>>8)&255;
const b = bigint&255;

return {r,g,b};

}

colorPicker.oninput = () => currentColor=colorPicker.value;
brushSize.oninput = () => currentSize=brushSize.value;
opacitySlider.oninput = () => currentOpacity=opacitySlider.value;
brushType.oninput = () => currentBrush=brushType.value;

eraserBtn.onclick = () => erasing=!erasing;

clearBtn.onclick = () =>
drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);

saveBtn.onclick = () =>{

const merged = document.createElement("canvas");

merged.width = baseCanvas.width;
merged.height = baseCanvas.height;

const mergedCtx = merged.getContext("2d");

mergedCtx.drawImage(baseCanvas,0,0);
mergedCtx.drawImage(drawCanvas,0,0);

const link=document.createElement("a");

link.download="mi_coloreo.png";
link.href=merged.toDataURL();

link.click();

};

</script>

</body>
</html>
